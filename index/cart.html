<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart | QuickBite AI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-white shadow-sm sticky-top py-2">
    <div class="container">
      <a class="navbar-brand" href="index.html"><i class="fas fa-robot me-2 text-warning"></i>QuickBite AI</a>
    </div>
  </nav>
  <div class="container my-5">
    <h2 class="fw-bold mb-4"><i class="fas fa-shopping-cart text-warning me-2"></i>Your Cart</h2>
    <div id="cartItemsList" class="mb-4"></div>
    <div class="d-flex justify-content-between align-items-center border-top pt-3">
      <span class="fw-bold fs-5">Total:</span>
      <span id="cartTotalPrice" class="fw-bold fs-5">$0.00</span>
    </div>
    <button class="btn btn-success w-100 mt-4 rounded-pill" id="checkoutBtn"><i class="fas fa-bolt"></i> Proceed to Checkout</button>
    <p class="small text-muted mt-2 text-center">✨ AI-powered order suggestions ready</p>
  </div>
  <footer class="footer mt-5 pt-4 pb-3">
    <div class="container text-center">
      <p class="mb-0"><i class="fas fa-brain me-1"></i> QuickBite AI — Smarter food delivery, powered by AI intelligence & real-time recommendations.</p>
      <small>© 2025 QuickBite AI | Simulating smart recommendation system</small>
    </div>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/cart.js"></script>
  <script>
    // Ensure cart loads and displays on page load
    window.addEventListener('DOMContentLoaded', function() {
      if (typeof loadCart === 'function') loadCart();
    });
  </script>
</body>
</html>
